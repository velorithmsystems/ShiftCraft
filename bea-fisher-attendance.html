/* =========================
   ASSISTANT — shared logic
========================= */
const CATEGORY_META = {
  Leave:    { label: 'Leave',      tone: 'green' },
  HR:       { label: 'HR Rules',   tone: 'teal' },
  Company:  { label: 'Company',    tone: 'indigo' },
  FirstAid: { label: 'First Aid',  tone: 'red' },
};

const tokenize = (s) => (s || '').toLowerCase().match(/[a-z0-9]+/g) || [];
const STOP = new Set(['the','a','an','is','are','do','i','my','me','what','how','can','to','of','for','and','on','in','about','with','tell','show','give','please','you','have','many','much','get','our','that','this']);

// Score a KB article against query tokens
const scoreArticle = (article, qTokens) => {
  let score = 0;
  const titleTokens = new Set(tokenize(article.title));
  const tagTokens = new Set(article.tags.flatMap(tokenize));
  const bodyTokens = new Set(tokenize(article.body));
  qTokens.forEach(t => {
    if (STOP.has(t)) return;
    if (tagTokens.has(t)) score += 5;
    if (titleTokens.has(t)) score += 3;
    if (bodyTokens.has(t)) score += 1;
  });
  return score;
};

// Find which caregiver (if any) a query refers to — used by supervisors
const matchCaregiver = (query, caregivers) => {
  const q = query.toLowerCase();
  return caregivers.find(c => {
    const parts = c.name.toLowerCase().split(/\s+/);
    return parts.some(p => p.length > 2 && q.includes(p)) || q.includes(c.username);
  });
};

const LeaveBalanceCard = ({ name, balance }) => {
  if (!balance) return <p className="text-sm text-gray-500">No leave record found for {name}.</p>;
  const rows = [
    { k: 'Annual', d: balance.annual, tone: 'teal' },
    { k: 'Sick', d: balance.sick, tone: 'amber' },
    { k: 'Personal', d: balance.personal, tone: 'indigo' },
  ];
  return (
    <div>
      <div className="text-sm font-medium text-gray-800 mb-2">Leave balance — {name}</div>
      <div className="grid grid-cols-3 gap-2">
        {rows.map(r => (
          <div key={r.k} className="rounded-lg border border-gray-200 bg-white p-2 text-center">
            <div className="text-xs text-gray-500">{r.k}</div>
            <div className="text-xl font-bold text-teal-700">{r.d.remaining}</div>
            <div className="text-[10px] text-gray-400">of {r.d.entitled} left · {r.d.used} used</div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* =========================
   HR & CARE ASSISTANT (chat)
========================= */
const HelpAssistant = ({ state, currentUser }) => {
  const isSupervisor = currentUser.role === 'supervisor';
  const caregivers = state.users.filter(u => u.role === 'caregiver');
  const kb = state.knowledgeBase || [];

  const greeting = {
    role: 'bot',
    text: isSupervisor
      ? `Hi ${currentUser.name.split(' ')[0]} — ask me about HR rules, company policy, first-aid guidance, or a caregiver's leave balance (e.g. "leave balance for Mark").`
      : `Hi ${currentUser.name.split(' ')[0]} — ask me about your leave balance, HR rules, company policy, or first-aid guidance for assisting people with disabilities.`,
  };
  const [messages, setMessages] = useState([greeting]);
  const [input, setInput] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const answer = (query) => {
    const qTokens = tokenize(query);
    const wantsLeave = qTokens.some(t => ['leave','balance','vacation','holiday','sick','days','pto','annual','personal','off'].includes(t));

    // Leave balance intent
    if (wantsLeave) {
      let target = currentUser;
      if (isSupervisor) {
        const matched = matchCaregiver(query, caregivers);
        target = matched || null;
      }
      if (isSupervisor && !target) {
        return { text: 'Whose leave balance would you like? Try "leave balance for Aisha".' };
      }
      const balance = (state.leaveBalances || {})[target.id];
      return { card: <LeaveBalanceCard name={target.name} balance={balance} />, text: '' };
    }

    // Knowledge base intent — rank articles
    const ranked = kb
      .map(a => ({ a, s: scoreArticle(a, qTokens) }))
      .filter(x => x.s > 0)
      .sort((x, y) => y.s - x.s)
      .slice(0, 2);

    if (ranked.length === 0) {
      return { text: "I couldn't find that. Try keywords like \"sick leave\", \"uniform\", \"confidentiality\", \"seizure\", or \"choking\". For anything urgent or medical, call emergency services." };
    }
    return { articles: ranked.map(r => r.a), text: '' };
  };

  const send = (text) => {
    const q = (text ?? input).trim();
    if (!q) return;
    const reply = answer(q);
    setMessages(m => [...m, { role: 'user', text: q }, { role: 'bot', ...reply }]);
    setInput('');
  };

  const suggestions = isSupervisor
    ? ['Leave balance for Mark', 'Overtime rules', 'Incident reporting', 'Seizure first aid']
    : ['My leave balance', 'How much sick leave?', 'Choking first aid', 'Uniform policy'];

  return (
    <div className="space-y-4">
      <div className="rounded-xl bg-gradient-to-r from-teal-700 to-teal-600 text-white p-4">
        <div className="font-semibold text-lg">HR &amp; Care Assistant</div>
        <div className="text-sm text-teal-50">Leave balances · HR &amp; company rules · disability first-aid guidance</div>
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-200">
        <div ref={scrollRef} className="p-4 space-y-3 max-h-[420px] overflow-y-auto">
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-[85%] rounded-2xl px-3 py-2 text-sm ${
                m.role === 'user' ? 'bg-teal-600 text-white rounded-br-sm' : 'bg-gray-100 text-gray-800 rounded-bl-sm'
              }`}>
                {m.text && <div className="whitespace-pre-wrap">{m.text}</div>}
                {m.card && <div className="mt-1">{m.card}</div>}
                {m.articles && (
                  <div className="space-y-2 mt-1">
                    {m.articles.map(a => (
                      <div key={a.id} className="bg-white rounded-lg border border-gray-200 p-2">
                        <div className="flex items-center gap-2 mb-1">
                          <Badge tone={CATEGORY_META[a.category].tone}>{CATEGORY_META[a.category].label}</Badge>
                          <span className="font-semibold text-gray-800 text-sm">{a.title}</span>
                        </div>
                        <div className="text-gray-700 text-xs leading-relaxed">{a.body}</div>
                      </div>
                    ))}
                    {m.articles.some(a => a.category === 'FirstAid') && (
                      <div className="text-[11px] text-red-700 bg-red-50 border border-red-100 rounded-lg px-2 py-1">
                        This is general guidance, not a substitute for trained first aid. In an emergency, call your local emergency number.
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        <div className="border-t border-gray-100 p-3">
          <div className="flex flex-wrap gap-1.5 mb-2">
            {suggestions.map(s => (
              <button key={s} onClick={() => send(s)}
                className="text-xs bg-teal-50 text-teal-700 border border-teal-100 rounded-full px-2.5 py-1 hover:bg-teal-100">{s}</button>
            ))}
          </div>
          <div className="flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') send(); }}
              placeholder="Ask a question…"
              className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500" />
            <button onClick={() => send()} className="btn-primary rounded-lg px-4 py-2 text-sm font-medium">Send</button>
          </div>
        </div>
      </div>
      <p className="text-xs text-gray-500">Answers are drawn from your organization's policy library and leave data. Update the content in the app's seed data (or via the Caregivers and Settings tabs) to match your institution.</p>
    </div>
  );
};

/* =========================
   KNOWLEDGE SEARCH (agent)
========================= */
const KnowledgeSearch = ({ state, currentUser }) => {
  const isSupervisor = currentUser.role === 'supervisor';
  const kb = state.knowledgeBase || [];
  const caregivers = state.users.filter(u => u.role === 'caregiver');
  const directory = state.directory || {};

  const [query, setQuery] = useState('');
  const [filter, setFilter] = useState('all'); // all | HR | Company | FirstAid | Staff

  const qTokens = tokenize(query);

  // Policy/doc results
  let docResults = kb.map(a => ({ a, s: query ? scoreArticle(a, qTokens) : 1 }))
    .filter(x => x.s > 0)
    .sort((x, y) => y.s - x.s)
    .map(x => x.a);
  if (filter !== 'all' && filter !== 'Staff') docResults = docResults.filter(a => a.category === filter);

  // Staff directory results (supervisors only)
  let staffResults = [];
  if (isSupervisor) {
    staffResults = caregivers.filter(c => {
      if (!query) return true;
      const d = directory[c.id] || {};
      const hay = `${c.name} ${c.username} ${(d.certs||[]).join(' ')} ${d.team||''} ${d.email||''}`.toLowerCase();
      return qTokens.some(t => !STOP.has(t) && hay.includes(t));
    });
  }

  const showDocs = filter === 'all' || filter !== 'Staff';
  const showStaff = isSupervisor && (filter === 'all' || filter === 'Staff');

  const filters = [
    { id: 'all', label: 'All' },
    { id: 'HR', label: 'HR Rules' },
    { id: 'Company', label: 'Company' },
    { id: 'FirstAid', label: 'First Aid' },
    ...(isSupervisor ? [{ id: 'Staff', label: 'Staff' }] : []),
  ];

  return (
    <div className="space-y-4">
      <div className="rounded-xl bg-gradient-to-r from-slate-800 to-slate-700 text-white p-4">
        <div className="font-semibold text-lg">Knowledge Search</div>
        <div className="text-sm text-slate-200">Search policies, HR &amp; company rules, first-aid guides{isSupervisor ? ', and the staff directory' : ''}.</div>
      </div>

      <div className="flex gap-2">
        <input value={query} onChange={e => setQuery(e.target.value)} autoFocus
          placeholder="Search… e.g. 'confidentiality', 'seizure', 'CPR'"
          className="flex-1 border border-gray-300 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-teal-500" />
        {query && <button onClick={() => setQuery('')} className="px-3 py-2 text-sm border rounded-lg text-gray-600">Clear</button>}
      </div>

      <div className="flex flex-wrap gap-1.5">
        {filters.map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`text-xs rounded-full px-3 py-1 border ${
              filter === f.id ? 'bg-teal-600 text-white border-teal-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'
            }`}>{f.label}</button>
        ))}
      </div>

      {showStaff && staffResults.length > 0 && (
        <Card title="Staff directory">
          <div className="grid sm:grid-cols-2 gap-3">
            {staffResults.map(c => {
              const d = directory[c.id] || {};
              return (
                <div key={c.id} className="border border-gray-200 rounded-lg p-3">
                  <div className="font-medium text-gray-800">{c.name}</div>
                  <div className="text-xs text-gray-500 mb-1">{d.team} · {d.phone} · {d.email}</div>
                  <div className="flex flex-wrap gap-1">
                    {(d.certs || []).map(cert => <Badge key={cert} tone="teal">{cert}</Badge>)}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {showDocs && (
        <Card title={`Policies & guides${docResults.length ? ` (${docResults.length})` : ''}`}>
          {docResults.length === 0 ? (
            <p className="text-sm text-gray-500">No matching articles. Try another keyword.</p>
          ) : (
            <div className="space-y-3">
              {docResults.map(a => (
                <div key={a.id} className="border-l-4 border-teal-500 bg-gray-50 rounded-r-lg p-3">
                  <div className="flex items-center gap-2 mb-1">
                    <Badge tone={CATEGORY_META[a.category].tone}>{CATEGORY_META[a.category].label}</Badge>
                    <span className="font-semibold text-gray-800">{a.title}</span>
                  </div>
                  <p className="text-sm text-gray-700 leading-relaxed">{a.body}</p>
                  {a.category === 'FirstAid' && (
                    <p className="text-[11px] text-red-700 mt-1">General guidance only — in an emergency, call your local emergency number.</p>
                  )}
                </div>
              ))}
            </div>
          )}
        </Card>
      )}
    </div>
  );
};

/* =========================
   CAREGIVER VIEW
========================= */
const CaregiverHome = ({ state, setState, currentUser }) => {
  const [tab, setTab] = useState('schedule');
  const myShifts = state.shifts.filter(s => s.caregiverId === currentUser.id);
  const myEntries = state.timeEntries.filter(e => e.caregiverId === currentUser.id);

  const weekStart = getWeekStart(new Date());
  const week = weekDates(weekStart);
  const myWeekShifts = myShifts.filter(s => week.includes(s.date)).sort((a,b) => a.date.localeCompare(b.date));

  const today = fmtDateISO(new Date());
  const todaysShift = myShifts.find(s => s.date === today);

  // --- Self clock-in / clock-out (system-generated timestamps) ---
  const nowHHMM = () => {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const todayEntries = myEntries.filter(e => e.date === today);
  const openEntry = todayEntries.find(e => e.timeIn && !e.timeOut);
  const completedToday = todayEntries.find(e => e.timeIn && e.timeOut);
  const activeShiftType = todaysShift?.shiftType || 'day';

  const [geoBusy, setGeoBusy] = useState(false);

  const clockIn = async () => {
    const ts = new Date().toISOString();
    const t = nowHHMM();
    setGeoBusy(true);
    const geoIn = await buildGeoStamp(state.worksite);
    setGeoBusy(false);
    setState(prev => ({
      ...prev,
      timeEntries: [...prev.timeEntries, {
        id: newId(), caregiverId: currentUser.id, date: today,
        timeIn: t, timeOut: '', shiftType: activeShiftType,
        source: 'self', status: 'pending', notes: '',
        geoIn,
        auditLog: [{ ts, by: currentUser.username, action: `Self clock-in ${t}${auditFragment(geoIn)}` }],
      }],
    }));
  };

  const clockOut = async () => {
    if (!openEntry) return;
    const ts = new Date().toISOString();
    const t = nowHHMM();
    setGeoBusy(true);
    const geoOut = await buildGeoStamp(state.worksite);
    setGeoBusy(false);
    setState(prev => ({
      ...prev,
      timeEntries: prev.timeEntries.map(e => e.id === openEntry.id
        ? { ...e, timeOut: t, geoOut, status: 'pending',
            auditLog: [...(e.auditLog||[]), { ts, by: currentUser.username, action: `Self clock-out ${t}${auditFragment(geoOut)}` }] }
        : e),
    }));
  };

  // Pay period (last 14 days)
  const ppEnd = new Date();
  const ppStart = new Date(); ppStart.setDate(ppStart.getDate() - 13);
  const ppEntries = myEntries.filter(e => e.date >= fmtDateISO(ppStart) && e.date <= fmtDateISO(ppEnd));
  const totalMins = ppEntries.reduce((s, e) => s + minsBetween(e.timeIn, e.timeOut, e.shiftType), 0);

  return (
    <div className="space-y-4">
      <div className="rounded-2xl bg-gradient-to-r from-teal-600 to-teal-700 text-white p-5 shadow">
        <div className="text-sm opacity-90">Welcome back,</div>
        <div className="text-2xl font-bold">{currentUser.name}</div>
        <div className="mt-3 text-sm">
          {todaysShift
            ? <>Today: <ShiftBadge type={todaysShift.shiftType} shiftTypes={state.shiftTypes} /></>
            : <>You have no shift scheduled today.</>}
        </div>
      </div>

      {/* Clock in / out */}
      <Card>
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div>
            <div className="text-sm font-semibold text-gray-800">Time clock</div>
            {openEntry ? (
              <div className="text-sm text-gray-600 mt-0.5 flex flex-wrap gap-x-2 gap-y-1 items-center">
                <span>Clocked in at <span className="font-mono font-medium text-teal-700">{openEntry.timeIn}</span></span>
                <Badge tone="yellow">Pending approval</Badge>
                {(() => { const v = verifySummary(openEntry.geoIn); return v ? <Badge tone={v.tone}>{v.text}</Badge> : null; })()}
              </div>
            ) : completedToday ? (
              <div className="text-sm text-gray-600 mt-0.5 flex flex-wrap gap-x-2 gap-y-1 items-center">
                <span>Today: <span className="font-mono">{completedToday.timeIn}</span> → <span className="font-mono">{completedToday.timeOut}</span></span>
                <Badge tone={completedToday.status === 'approved' ? 'green' : 'yellow'}>{completedToday.status === 'approved' ? 'Approved' : 'Pending approval'}</Badge>
                {(() => { const v = verifySummary(completedToday.geoIn); return v ? <Badge tone={v.tone}>In: {v.text}</Badge> : null; })()}
                {(() => { const v = verifySummary(completedToday.geoOut); return v ? <Badge tone={v.tone}>Out: {v.text}</Badge> : null; })()}
              </div>
            ) : (
              <div className="text-sm text-gray-600 mt-0.5">You haven't clocked in today.</div>
            )}
          </div>
          <div>
            {openEntry ? (
              <button onClick={clockOut} disabled={geoBusy}
                className={`w-full sm:w-auto font-medium rounded-lg px-5 py-2.5 text-white ${geoBusy ? 'bg-indigo-300 cursor-wait' : 'bg-indigo-700 hover:bg-indigo-800'}`}>
                {geoBusy ? 'Verifying location…' : 'Clock Out'}
              </button>
            ) : completedToday ? (
              <button disabled
                className="w-full sm:w-auto bg-gray-100 text-gray-400 font-medium rounded-lg px-5 py-2.5 cursor-not-allowed">
                Shift complete
              </button>
            ) : (
              <button onClick={clockIn} disabled={geoBusy}
                className={`w-full sm:w-auto font-medium rounded-lg px-5 py-2.5 ${geoBusy ? 'bg-teal-300 text-white cursor-wait' : 'btn-primary'}`}>
                {geoBusy ? 'Verifying location…' : 'Clock In'}
              </button>
            )}
          </div>
        </div>
        <p className="text-xs text-gray-500 mt-3 border-t pt-2">
          The time is recorded automatically from your device clock — you can't enter it by hand. Self clock-ins are marked
          <span className="font-medium"> self-reported</span> and reviewed by your supervisor before payroll.
          When the worksite is configured, your device's GPS is captured at clock-in/out and compared to the worksite radius —
          coordinates are stored on your entry only, never tracked continuously through your shift.
        </p>
      </Card>

      {/* My week */}
      <Card title="This Week">
        <ul className="divide-y divide-gray-100">
          {week.map(d => {
            const shift = myWeekShifts.find(s => s.date === d);
            return (
              <li key={d} className="py-3 flex items-center justify-between">
                <div>
                  <div className="font-medium">{weekday(d)}</div>
                  <div className="text-xs text-gray-500">{niceDate(d)}</div>
                </div>
                {shift ? <ShiftBadge type={shift.shiftType} shiftTypes={state.shiftTypes} /> : <span className="text-sm text-gray-400">Off</span>}
              </li>
            );
          })}
        </ul>
      </Card>

      {/* Time records */}
      <Card title="My Time Records">
        {myEntries.length === 0
          ? <div className="text-sm text-gray-500">No entries yet. When you clock in, your time record appears here.</div>
          : <ul className="divide-y divide-gray-100 text-sm">
              {myEntries.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map(e => (
                <li key={e.id} className="py-2.5 flex flex-wrap items-center justify-between gap-2">
                  <div>
                    <div className="font-medium">{niceDate(e.date)} · <ShiftBadge type={e.shiftType} shiftTypes={state.shiftTypes} /></div>
                    <div className="text-xs text-gray-500 font-mono">{e.timeIn || '—'} → {e.timeOut || '—'}</div>
                  </div>
                  <div className="flex flex-wrap gap-1">
                    <Badge tone={e.status === 'approved' ? 'green' : 'yellow'}>{e.status === 'approved' ? 'Approved' : 'Pending'}</Badge>
                    {(() => { const v = verifySummary(e.geoIn);  return v ? <Badge tone={v.tone}>In: {v.text}</Badge>  : null; })()}
                    {(() => { const v = verifySummary(e.geoOut); return v ? <Badge tone={v.tone}>Out: {v.text}</Badge> : null; })()}
                  </div>
                </li>
              ))}
            </ul>}
      </Card>

      <Card title="Pay-Period Summary (last 14 days)">
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <StatCard label="Entries" value={ppEntries.length} tone="teal" />
          <StatCard label="Hours" value={minsToHrs(totalMins)} tone="teal" />
          <StatCard label="Approved" value={ppEntries.filter(e => e.status === 'approved').length} tone="green" />
        </div>
      </Card>
    </div>
  );
};

/* =========================
   APP — auth + role routing
========================= */
const App = () => {
  const [state, setState] = useState(loadState);
  useEffect(() => { saveState(state); }, [state]);
  const [currentUser, setCurrentUser] = useState(null);

  const handleLogin = (user) => setCurrentUser(user);
  const signOut = () => setCurrentUser(null);

  if (!currentUser) return <Login onLogin={handleLogin} users={state.users} />;

  return (
    <div className="min-h-screen bg-gray-50">
      <AppHeader user={currentUser} companyName={state.companyName} onSignOut={signOut} />
      <main className="max-w-6xl mx-auto px-4 py-6">
        {currentUser.role === 'supervisor'
          ? <SupervisorShell state={state} setState={setState} currentUser={currentUser} />
          : <CaregiverHome state={state} setState={setState} currentUser={currentUser} />}
      </main>
    </div>
  );
};

const SupervisorShell = ({ state, setState, currentUser }) => {
  const [tab, setTab] = useState('dashboard');
  const tabs = [
    { id: 'dashboard',  label: 'Dashboard' },
    { id: 'schedule',   label: 'Schedule' },
    { id: 'entries',    label: 'Time Entries' },
    { id: 'employees',  label: 'Employees' },
    { id: 'reports',    label: 'Reports' },
    { id: 'assistant',  label: 'HR Assistant' },
    { id: 'search',     label: 'Search' },
    { id: 'intake',     label: 'Customization' },
    { id: 'settings',   label: 'Settings' },
  ];
  return (
    <div className="space-y-4">
      <div className="flex gap-1 border-b border-gray-200 text-sm overflow-x-auto">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`px-3 py-2 border-b-2 -mb-px font-medium whitespace-nowrap ${tab===t.id ? 'tab-active' : 'border-transparent text-gray-500'}`}>
            {t.label}
          </button>
        ))}
      </div>
      {tab === 'dashboard' && <SupervisorDashboard state={state} />}
      {tab === 'schedule'  && <Schedule state={state} setState={setState} />}
      {tab === 'entries'   && <TimeEntries state={state} setState={setState} currentUser={currentUser} />}
      {tab === 'employees' && <Caregivers state={state} setState={setState} />}
      {tab === 'reports'   && <Reports state={state} />}
      {tab === 'assistant' && <HelpAssistant state={state} currentUser={currentUser} />}
      {tab === 'search'    && <KnowledgeSearch state={state} currentUser={currentUser} />}
      {tab === 'intake'    && <CustomizationIntake state={state} />}
      {tab === 'settings'  && <Settings state={state} setState={setState} />}
    </div>
  );
};

  <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <svg width="34" height="38" viewBox="0 0 400 360" aria-label="Velogorithm">

              <stop offset="40%" stopColor="#C8941E"/>

              <stop offset="100%" stopColor="#F5CC74"/>
            </linearGradient>
            <linearGradient id="vgAppMtnHdr" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stopColor="#6E4A12" stopOpacity="0.85"/>
              <stop offset="100%" stopColor="#6E4A12" stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path fill="url(#vgAppHdr)" d="M 60 90 L 135 90 L 200 250 L 265 90 L 340 90 L 200 340 Z"/>
          <path fill="url(#vgAppHdr)" d="M 240 90 L 280 10 L 305 60 L 322 30 L 348 90 Z"/>
          <path fill="url(#vgAppMtnHdr)" d="M 240 90 L 280 10 L 290 65 L 260 90 Z"/>
        </svg>
        <div className="leading-tight">
          <div className="font-bold text-gray-800 text-base">ShiftFlow</div>
          <div className="text-xs text-gray-500">{companyName || 'Demo Care Services'} · by Velogorithm</div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <div className="text-right hidden sm:block">
          <div className="text-sm font-medium text-gray-800">{user.name}</div>
          <div className="text-xs text-gray-500 capitalize">{user.role}</div>

        <button onClick={onSignOut} className="text-sm text-teal-700 hover:underline font-medium">Sign out</button>
      </div>
    </div>
  </header>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
